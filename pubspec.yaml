name: wealth_ninja
description: "A wealth tracking Flutter app."
publish_to: 'none'
version: 0.0.1+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  fl_chart: ^1.1.1
  intl: ^0.20.2
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/splash.jpg
    - assets/icon.jpg
